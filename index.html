<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>极简主页</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/search-bar.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="css/layout-toggle.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/wallpaper.css">
  <link rel="stylesheet" href="css/bookmarks.css">
  <link rel="stylesheet" href="css/clock.css">
</head>
<body>
  <div id="wallpaperLayer"></div>
  <div class="app-container">
    <main class="main-content">
      <div class="clock" id="clock"></div>
      <section class="search-section"></section>
      <div class="expandable-area" id="expandableArea">
        <!-- 未来扩展模块区域 -->
      </div>
    </main>

    <div class="toggle-bar">
      <button class="toggle-btn" id="toggleBtn">
        <span class="toggle-icon">▼</span>
        <span class="toggle-label">展开</span>
      </button>
    </div>
  </div>

  <button class="settings-trigger" id="settingsTrigger" title="设置">⚙</button>
  <div class="settings-overlay" id="settingsOverlay"></div>
  <div class="settings-panel" id="settingsPanel"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
