<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>极简主页</title>
  <script>
    (function() {
      function getStored(key, def) {
        try {
          var raw = localStorage.getItem(key);
          if (raw) { var v = JSON.parse(raw); if (v !== null && v !== undefined) return v; }
        } catch(e) {}
        return def;
      }
      var themeStyle = getStored('themeStyle', 'blue');
      var m = themeStyle.match(/^(.*?)-(light|dark)$/);
      var isDark;
      if (m) { isDark = m[2] === 'dark'; }
      else { isDark = window.matchMedia('(prefers-color-scheme: dark)').matches; }
      var base = m ? m[1] : themeStyle;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      if (base !== 'blue') document.documentElement.setAttribute('data-theme-style', base);

      var uiStyle = getStored('uiStyle', 'default');
      if (uiStyle !== 'default') document.documentElement.setAttribute('data-ui-style', uiStyle);

      var UI_CSS_MAP = {
        'glass': 'css/ui-glass.css?v=071',
        'neo': 'css/ui-neumorphism.css?v=071',
        'noir': 'css/ui-borderless.css?v=071',
        'line': 'css/ui-hairline.css?v=071',
        'mint': 'css/ui-gradient.css?v=071',
        'paper': 'css/ui-material.css?v=071',
        'frost': 'css/ui-frost.css?v=071',
        'ink': 'css/ui-ink.css?v=071',
        'aurora': 'css/ui-aurora.css?v=071',
        'dot': 'css/ui-dot.css?v=071',
        'switch': 'css/ui-switch.css?v=071',
      };
      window.__loadUIStyleCSS = function(style) {
        document.querySelectorAll('link[data-ui-css]').forEach(function(el) { el.remove(); });
        var href = UI_CSS_MAP[style];
        if (href) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          link.setAttribute('data-ui-css', '');
          document.head.appendChild(link);
        }
      };
      window.__loadUIStyleCSS(uiStyle);
    })();
  </script>
  <link rel="stylesheet" href="css/reset.css?v=069">
  <link rel="stylesheet" href="css/variables.css?v=069">
  <link rel="stylesheet" href="css/base.css?v=069">
  <link rel="stylesheet" href="css/search-bar.css?v=075">
  <link rel="stylesheet" href="css/settings.css?v=072">
  <link rel="stylesheet" href="css/layout-toggle.css?v=069">
  <link rel="stylesheet" href="css/responsive.css?v=072">
  <link rel="stylesheet" href="css/wallpaper.css?v=069">
  <link rel="stylesheet" href="css/bookmarks.css?v=069">
  <link rel="stylesheet" href="css/animations.css?v=069">

  <style>
.version-info { font-size: 0; color: transparent; }
.version-info::before { content: 'v0.75'; font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }
  </style>
</head>
<body>
  <div id="wallpaperLayer"></div>
  <div class="app-container">
    <main class="main-content">
      <section class="search-section"></section>
      <div class="expandable-area" id="expandableArea">
      </div>
    </main>

    <div class="toggle-bar">
      <button class="toggle-btn" id="toggleBtn">
        <span class="toggle-icon">▼</span>
        <span class="toggle-label">展开</span>
      </button>
    </div>
  </div>

  <button class="settings-trigger" id="settingsTrigger" title="设置">⚙</button>
  <div class="settings-overlay" id="settingsOverlay"></div>
  <div class="settings-panel" id="settingsPanel"></div>

  <script type="module" src="js/main.js?v=071"></script>
</body>
</html>
